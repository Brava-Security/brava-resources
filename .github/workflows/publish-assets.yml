name: Publish assets

on:
  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.sh'
  workflow_dispatch:   # lets you trigger a manual republish

permissions:
  contents: write       # required to create/edit releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect asset files (flatten into dist/)
        run: |
          set -euo pipefail
          # release assets are a flat namespace — fail loudly if two files share a basename
          dups=$(find . \( -path ./.git -o -path ./.github -o -path ./dist \) -prune -o \
            -type f \( -name '*.tf' -o -name '*.sh' \) -printf '%f\n' | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate asset basenames would clobber each other: $dups"
            exit 1
          fi
          mkdir -p dist
          find . \( -path ./.git -o -path ./.github -o -path ./dist \) -prune -o \
            -type f \( -name '*.tf' -o -name '*.sh' \) -exec cp {} dist/ \;
          # record the published file set in the CI log for auditing
          ls -l dist

      - name: Publish / refresh the rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Tag is kept as "tf-assets" so existing /releases/latest/download/<file>
          # URLs in the docs keep resolving, even though it now also ships scripts.
          TAG=tf-assets
          # create the release once; on later runs it already exists
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Brava onboarding assets (latest)" \
              --notes "Auto-published Terraform files and setup scripts referenced by the Brava docs. Managed by CI — do not edit assets by hand." \
              --latest
          # overwrite the assets with the current files
          gh release upload "$TAG" dist/* --clobber
          # keep this release marked as "latest" so /releases/latest/download resolves here
          gh release edit "$TAG" --latest
